name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Run OpenAPI validator
        env:
          OPENAPI_SPEC: ohmf/packages/protocol/openapi/openapi.yaml
        run: |
          echo "Running OpenAPI validator"
          cd tools/validate_openapi || exit 1
          go run . -spec ../../${OPENAPI_SPEC}

      - name: Run repository tests (script)
        run: |
          chmod +x ./scripts/run-tests.sh || true
          ./scripts/run-tests.sh

      - name: Build docker images
        run: |
          docker compose build --pull

      - name: Run containerized integration test
        run: |
          # Run the dedicated itest service inside the compose network.
          docker compose up --build --abort-on-container-exit --exit-code-from itest itest

      - name: Collect docker-compose logs on failure
        if: failure()
        run: |
          mkdir -p ci-logs
          docker compose logs > ci-logs/docker-compose.log || true
        continue-on-error: true

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: ci-logs

      - name: Teardown
        if: always()
        run: |
          docker compose down -v
