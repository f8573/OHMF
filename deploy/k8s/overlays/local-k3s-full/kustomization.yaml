apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay: local single-node k3s full-pipeline baseline.
#
# This profile keeps the same "local, single-node, bounded" honesty as
# overlays/local-k3s, but adds enough infrastructure to exercise the real async
# message path:
#   gateway/API -> Kafka -> messages-processor -> Postgres/Cassandra/Redis
#
# It is intentionally NOT a production stack: Kafka and Cassandra stay
# single-node and ephemeral, there is no HA, and no claim is made beyond local
# reproducibility.

namespace: ohmf

resources:
  - ../../base
  - kafka.yaml
  - cassandra.yaml
  - kafka-init-job.yaml
  - messages-processor-service.yaml

patchesStrategicMerge:
  - configmap-patch.yaml
  - gateway-env-patch.yaml
  - worker-patch.yaml
  - resource-patches.yaml
