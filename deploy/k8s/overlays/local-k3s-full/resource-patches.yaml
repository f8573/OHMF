# Bounded resource sizing for a stronger single-node dev machine.
#
# This profile is intentionally heavier than overlays/local-k3s because Kafka,
# Cassandra, and the live async message path are enabled. It still stays within
# a single-node local envelope and makes no throughput or production claim.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: gateway
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 800m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apps
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: apps
          resources:
            requests:
              cpu: 75m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messages-processor
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: messages-processor
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: postgres
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: redis
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: kafka
          resources:
            requests:
              cpu: 400m
              memory: 768Mi
            limits:
              cpu: 1500m
              memory: 1536Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cassandra
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: cassandra
          resources:
            requests:
              cpu: 500m
              memory: 1024Mi
            limits:
              cpu: 1500m
              memory: 2048Mi
