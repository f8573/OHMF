# messages-processor — a Kafka consumer / message persistence worker
# (cmd: ohmf/services/messages-processor/cmd/processor).
#
# DISABLED in the stage-1 profile: replicas is 0 on purpose.
#
# This worker requires Kafka AND Cassandra (plus Postgres + Redis) to do
# anything; none of Kafka/Cassandra are deployed in this profile (see
# deploy/k8s/README.md, "Staged deployment path"). Running it with replicas > 0
# here would just CrashLoop, which would be dishonest evidence. It is committed
# at replicas 0 so the worker's manifest shape (probes, resources, env wiring)
# is visible and reviewable, and so a future stage-2 overlay can enable it once
# in-cluster Kafka + Cassandra exist.
#
# To bring it up you must FIRST provide Kafka + Cassandra and add the
# corresponding env (APP_KAFKA_BROKERS, APP_CASSANDRA_HOSTS, topics, group id —
# see ohmf/infra/docker/docker-compose.yml), then scale replicas up.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messages-processor
  labels:
    app.kubernetes.io/name: messages-processor
    app.kubernetes.io/part-of: ohmf
    app.kubernetes.io/component: worker
  annotations:
    ohmf.dev/status: "disabled-stage1-needs-kafka-and-cassandra"
spec:
  replicas: 0 # intentionally disabled — see header comment
  selector:
    matchLabels:
      app.kubernetes.io/name: messages-processor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: messages-processor
        app.kubernetes.io/part-of: ohmf
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: messages-processor
          image: ohmf-messages-processor:dev
          imagePullPolicy: Never # local image; load into k3s/k3d/kind first
          ports:
            - name: http
              containerPort: 18088
          # NOTE: deliberately minimal env. This will NOT run correctly until
          # Kafka + Cassandra env is added (see header). Kept here as a shape.
          env:
            - name: APP_HTTP_ADDR
              value: ":18088"
            - name: APP_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: ohmf-secrets
                  key: APP_DB_DSN
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
