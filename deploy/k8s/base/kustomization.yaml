apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests for the OHMF local single-node deployment profile.
# Apply via an overlay (e.g. overlays/local-k3s), not directly, so resource
# sizing and any node-specific tweaks stay in one place.

namespace: ohmf

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: ohmf
      app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - configmap.yaml
  # secrets.example.yaml holds non-real, dev-only placeholder values. It is
  # included so `kustomize build` and the smoke script work out of the box on a
  # fresh clone. Replace with a real, untracked secret before any real use.
  - secrets.example.yaml
  - postgres-dev.yaml
  - redis-dev.yaml
  - api-deployment.yaml
  - gateway-deployment.yaml
  - gateway-service.yaml
  # messages-processor is committed at replicas: 0 (needs Kafka + Cassandra).
  - worker-deployment.yaml
