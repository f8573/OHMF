# EXAMPLE secret — DO NOT use these values for anything real.
#
# These are secret-SHAPED placeholders for local development only. They match
# the defaults already baked into the local Docker Compose stack so a fresh
# clone comes up without extra setup. Copy this file to `secrets.yaml`, change
# the values, and keep `secrets.yaml` out of version control before using this
# anywhere that matters.
#
# This profile intentionally does NOT integrate Vault/KMS/sealed-secrets. That
# is future work, not a claim made here.
apiVersion: v1
kind: Secret
metadata:
  name: ohmf-secrets
  labels:
    app.kubernetes.io/part-of: ohmf
type: Opaque
stringData:
  # Password for the in-cluster postgres-dev instance.
  POSTGRES_PASSWORD: "ohmf"
  # Full DSN handed to the apps service (host is the in-cluster Service name).
  APP_DB_DSN: "postgres://ohmf:ohmf@postgres:5432/ohmf?sslmode=disable"
  # JWT signing secret. Only consumed by the gateway in NON-smoke mode; included
  # here so the secret shape is complete for when the full gateway is enabled.
  APP_JWT_SECRET: "dev-only-change-me"
