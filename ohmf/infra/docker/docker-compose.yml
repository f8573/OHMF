name: ohmf

services:
  db:
    image: postgres:16-alpine
    container_name: ohmf-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ohmf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ohmf}
      POSTGRES_DB: ${POSTGRES_DB:-ohmf}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ohmf} -d ${POSTGRES_DB:-ohmf}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ohmf-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  cassandra:
    image: cassandra:5.0
    container_name: ohmf-cassandra
    ports:
      - "9042:9042"
    environment:
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    volumes:
      - cassandra_data:/var/lib/cassandra

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ohmf-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/kafka-topics --bootstrap-server kafka:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ohmf-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "/usr/bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic msg.ingress.v1 --partitions 96 --replication-factor 1 &&
      /usr/bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic msg.persisted.v1 --partitions 96 --replication-factor 1 &&
      /usr/bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic msg.delivery.v1 --partitions 96 --replication-factor 1 &&
      /usr/bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic msg.sms.dispatch.v1 --partitions 24 --replication-factor 1 &&
      /usr/bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic presence.events.v1 --partitions 48 --replication-factor 1 &&
      /usr/bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic microservice.events.v1 --partitions 96 --replication-factor 1 &&
      /usr/bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic msg.ingress.dlq.v1 --partitions 24 --replication-factor 1 &&
      /usr/bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic msg.delivery.dlq.v1 --partitions 24 --replication-factor 1 &&
      /usr/bin/kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic msg.sms.dlq.v1 --partitions 24 --replication-factor 1"
    restart: "no"

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: ohmf-prometheus
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/alerting.yml:/etc/prometheus/alerting.yml:ro
    ports:
      - "19090:9090"

  grafana:
    image: grafana/grafana:11.5.2
    container_name: ohmf-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "13000:3000"

  api:
    image: ohmf-api:dev
    build:
      context: ../../services/gateway
      dockerfile: Dockerfile
    container_name: ohmf-api
    depends_on:
      apps:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      APP_ENV: dev
      APP_ADDR: :${API_CONTAINER_PORT:-8080}
      APP_LOG_LEVEL: info
      APP_DB_DSN: postgres://${POSTGRES_USER:-ohmf}:${POSTGRES_PASSWORD:-ohmf}@db:5432/${POSTGRES_DB:-ohmf}?sslmode=disable
      APP_REDIS_ADDR: redis:6379
      APP_REDIS_DB: "0"
      APP_JWT_SECRET: dev-only-change-me
      APP_APPS_ADDR: http://apps:18086
      APP_ACCESS_TTL_MINUTES: "15"
      APP_REFRESH_TTL_HOURS: "720"
      APP_USE_KAFKA_SEND: "true"
      APP_USE_CASSANDRA_READS: "false"
      APP_ENABLE_WS_SEND: "true"
      APP_KAFKA_BROKERS: kafka:9092
      APP_KAFKA_CLIENT_ID: ohmf-gateway
      APP_KAFKA_INGRESS_TOPIC: msg.ingress.v1
      APP_KAFKA_PERSISTED_TOPIC: msg.persisted.v1
      APP_KAFKA_DELIVERY_TOPIC: msg.delivery.v1
      APP_KAFKA_SMS_DISPATCH_TOPIC: msg.sms.dispatch.v1
      APP_KAFKA_PRESENCE_TOPIC: presence.events.v1
      APP_KAFKA_MICROSERVICE_TOPIC: microservice.events.v1
      APP_ACK_TIMEOUT_MS: "2000"
      APP_CASSANDRA_HOSTS: cassandra:9042
      APP_CASSANDRA_KEYSPACE: ohmf_messages
      APP_CASSANDRA_CONSISTENCY: quorum
    ports:
      - "${API_HOST_PORT:-18080}:${API_CONTAINER_PORT:-8080}"

  apps:
    image: ohmf-apps:dev
    build:
      context: ../../..
      dockerfile: ohmf/services/apps/Dockerfile
    container_name: ohmf-apps
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ADDR: :18086
      APP_DB_DSN: postgres://${POSTGRES_USER:-ohmf}:${POSTGRES_PASSWORD:-ohmf}@db:5432/${POSTGRES_DB:-ohmf}?sslmode=disable
      APP_MIGRATIONS_DIR: /opt/ohmf/apps/migrations
      DATA_FILE: /var/lib/ohmf/apps/registry.json
    ports:
      - "18086:18086"

  messages-processor:
    build:
      context: ../../services/messages-processor
      dockerfile: Dockerfile
    container_name: ohmf-messages-processor
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      APP_DB_DSN: postgres://${POSTGRES_USER:-ohmf}:${POSTGRES_PASSWORD:-ohmf}@db:5432/${POSTGRES_DB:-ohmf}?sslmode=disable
      APP_REDIS_ADDR: redis:6379
      APP_KAFKA_BROKERS: kafka:9092
      APP_KAFKA_GROUP_ID: messages-processor-v1
      APP_KAFKA_INGRESS_TOPIC: msg.ingress.v1
      APP_KAFKA_PERSISTED_TOPIC: msg.persisted.v1
      APP_KAFKA_MICROSERVICE_TOPIC: microservice.events.v1
      APP_KAFKA_SMS_DISPATCH_TOPIC: msg.sms.dispatch.v1
      APP_KAFKA_DLQ_TOPIC: msg.ingress.dlq.v1
      APP_CASSANDRA_HOSTS: cassandra:9042
      APP_CASSANDRA_KEYSPACE: ohmf_messages
      APP_SHADOW_POSTGRES_WRITE: "true"

  delivery-processor:
    build:
      context: ../../services/delivery-processor
      dockerfile: Dockerfile
    container_name: ohmf-delivery-processor
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      APP_DB_DSN: postgres://${POSTGRES_USER:-ohmf}:${POSTGRES_PASSWORD:-ohmf}@db:5432/${POSTGRES_DB:-ohmf}?sslmode=disable
      APP_REDIS_ADDR: redis:6379
      APP_KAFKA_BROKERS: kafka:9092
      APP_KAFKA_GROUP_ID: delivery-processor-v1
      APP_KAFKA_PERSISTED_TOPIC: msg.persisted.v1
      APP_KAFKA_DELIVERY_TOPIC: msg.delivery.v1
      APP_KAFKA_DELIVERY_DLQ_TOPIC: msg.delivery.dlq.v1

  sms-processor:
    build:
      context: ../../services/sms-processor
      dockerfile: Dockerfile
    container_name: ohmf-sms-processor
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      APP_KAFKA_BROKERS: kafka:9092
      APP_KAFKA_GROUP_ID: sms-processor-v1
      APP_KAFKA_SMS_DISPATCH_TOPIC: msg.sms.dispatch.v1
      APP_KAFKA_DELIVERY_TOPIC: msg.delivery.v1
      APP_KAFKA_SMS_DLQ_TOPIC: msg.sms.dlq.v1

volumes:
  db_data:
  cassandra_data:
