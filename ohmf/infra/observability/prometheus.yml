global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerting.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: ohmf-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080

  - job_name: ohmf-messages-processor
    metrics_path: /metrics
    static_configs:
      - targets:
          - messages-processor:9091
          - messages-processor-b:9091

  - job_name: ohmf-sync-fanout-workers
    metrics_path: /metrics
    static_configs:
      - targets:
          - sync-fanout-worker-a:9094
          - sync-fanout-worker-b:9094

  - job_name: ohmf-delivery-processor
    metrics_path: /metrics
    static_configs:
      - targets:
          - delivery-processor:9092

  - job_name: ohmf-sms-processor
    metrics_path: /metrics
    static_configs:
      - targets:
          - sms-processor:9093
