openapi: 3.0.3
info:
  title: OHMF MVP API
  version: 1.1.0
servers:
  - url: http://localhost:18081
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorEnvelope:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true
    PhoneStartRequest:
      type: object
      required: [phone_e164, channel]
      properties:
        phone_e164: { type: string }
        channel: { type: string, enum: [SMS] }
    PhoneStartResponse:
      type: object
      properties:
        challenge_id: { type: string }
        expires_in_sec: { type: integer }
        retry_after_sec: { type: integer }
        otp_strategy: { type: string }
        provider: { type: string }
    PhoneVerifyRequest:
      type: object
      required: [challenge_id, otp_code, device]
      properties:
        challenge_id: { type: string }
        otp_code: { type: string }
        device:
          type: object
          properties:
            platform: { type: string }
            device_name: { type: string }
            push_token: { type: string }
            public_key: { type: string }
            capabilities:
              type: array
              items: { type: string }
    TokenPair:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    PhoneVerifyResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            user_id: { type: string }
            primary_phone_e164: { type: string }
        device:
          type: object
          properties:
            device_id: { type: string }
            platform: { type: string }
        tokens:
          $ref: '#/components/schemas/TokenPair'
    RecoveryCodeAuthRequest:
      type: object
      required: [phone_e164, code, device]
      properties:
        phone_e164: { type: string }
        code: { type: string }
        device:
          type: object
          properties:
            platform: { type: string }
            device_name: { type: string }
            public_key: { type: string }
            capabilities:
              type: array
              items: { type: string }
    RecoveryCodeAuthResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        user_id: { type: string }
        device_id: { type: string }
        expires_in: { type: integer }
    PairingStartResponse:
      type: object
      properties:
        pairing_session_id: { type: string }
        pairing_code: { type: string }
        expires_at:
          type: string
          format: date-time
    PairingCompleteRequest:
      type: object
      required: [pairing_code, device]
      properties:
        pairing_code: { type: string }
        device:
          type: object
          required: [platform]
          properties:
            platform: { type: string }
            device_name: { type: string }
            public_key: { type: string }
            push_token: { type: string }
            capabilities:
              type: array
              items: { type: string }
    PairingCompleteResponse:
      type: object
      properties:
        user_id: { type: string }
        device_id: { type: string }
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in: { type: integer }
    RecoveryCodesResponse:
      type: object
      properties:
        recovery_codes:
          type: array
          items: { type: string }
        expires_at:
          type: string
          format: date-time
    TwoFASetupRequest:
      type: object
      required: [method]
      properties:
        method:
          type: string
          enum: [sms, totp]
    TwoFASetupResponse:
      type: object
      properties:
        method: { type: string }
        secret: { type: string }
        provisioning_uri: { type: string }
    TwoFAVerifyRequest:
      type: object
      required: [method, code]
      properties:
        method:
          type: string
          enum: [sms, totp]
        code: { type: string }
    TwoFAVerifyResponse:
      type: object
      properties:
        verified: { type: boolean }
    TwoFAMethod:
      type: object
      properties:
        id: { type: integer }
        method_type: { type: string }
        enabled: { type: boolean }
        created_at:
          type: string
          format: date-time
    TwoFAMethodsResponse:
      type: object
      properties:
        methods:
          type: array
          items: { $ref: '#/components/schemas/TwoFAMethod' }
    CreateConversationRequest:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [DM, GROUP] }
        participants:
          type: array
          items: { type: string }
        participant_phones:
          type: array
          items: { type: string }
        title: { type: string }
        avatar_url: { type: string }
        encryption_state: { type: string, enum: [PLAINTEXT, PENDING_E2EE, ENCRYPTED] }
        transport_policy: { type: string, default: AUTO }
    Conversation:
      type: object
      properties:
        conversation_id: { type: string }
        type: { type: string }
        title: { type: string }
        avatar_url: { type: string }
        description: { type: string }
        creator_user_id: { type: string }
        encryption_state: { type: string }
        encryption_epoch: { type: integer }
        e2ee_ready: { type: boolean }
        e2ee_blocked_member_ids:
          type: array
          items: { type: string }
        participants:
          type: array
          items: { type: string }
        external_phones:
          type: array
          items: { type: string }
        updated_at:
          type: string
          format: date-time
        last_message_preview: { type: string }
        unread_count: { type: integer }
        nickname: { type: string }
        viewer_role: { type: string, enum: [OWNER, ADMIN, MEMBER] }
        closed: { type: boolean }
        archived: { type: boolean }
        pinned: { type: boolean }
        muted_until:
          type: string
          format: date-time
        blocked: { type: boolean }
        blocked_by_viewer: { type: boolean }
        blocked_by_other: { type: boolean }
        allow_message_effects: { type: boolean }
        theme: { type: string }
        retention_seconds: { type: integer }
        expires_at:
          type: string
          format: date-time
        settings_version: { type: integer }
        settings_updated_at:
          type: string
          format: date-time
        thread_keys:
          type: array
          items:
            type: object
            additionalProperties:
              type: string
    ConversationListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Conversation' }
        next_cursor: { type: string }
    UpdateConversationPreferencesRequest:
      type: object
      properties:
        nickname: { type: string, nullable: true }
        closed: { type: boolean }
        archived: { type: boolean }
        pinned: { type: boolean }
        muted_until:
          type: string
          format: date-time
          nullable: true
    UpdateConversationMetadataRequest:
      type: object
      properties:
        title: { type: string, nullable: true }
        avatar_url: { type: string, nullable: true }
        description: { type: string, nullable: true }
        encryption_state: { type: string, enum: [PLAINTEXT, PENDING_E2EE, ENCRYPTED, CARRIER_PLAINTEXT] }
    UpdateConversationSettingsRequest:
      type: object
      properties:
        theme: { type: string, nullable: true }
        retention_seconds: { type: integer, nullable: true }
        expires_at:
          type: string
          format: date-time
          nullable: true
    UpdateConversationMembersRequest:
      type: object
      required: [user_ids]
      properties:
        user_ids:
          type: array
          items: { type: string }
    UpdateConversationMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role: { type: string, enum: [OWNER, ADMIN, MEMBER] }
    ConversationInvite:
      type: object
      properties:
        invite_id: { type: string }
        conversation_id: { type: string }
        code: { type: string }
        created_by_user_id: { type: string }
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        max_uses: { type: integer }
        use_count: { type: integer }
        revoked: { type: boolean }
    ConversationInviteListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ConversationInvite' }
    CreateConversationInviteRequest:
      type: object
      properties:
        max_uses: { type: integer }
        ttl_seconds: { type: integer }
    RedeemConversationInviteRequest:
      type: object
      required: [code]
      properties:
        code: { type: string }
    ConversationBanRequest:
      type: object
      required: [user_id]
      properties:
        user_id: { type: string }
        reason: { type: string }
    Profile:
      type: object
      properties:
        user_id: { type: string }
        display_name: { type: string }
        avatar_url: { type: string }
        primary_phone_e164: { type: string }
    ResolveProfilesRequest:
      type: object
      required: [user_ids]
      properties:
        user_ids:
          type: array
          items: { type: string }
    ResolveProfilesResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Profile' }
    DeviceKeyOneTimePrekey:
      type: object
      properties:
        prekey_id: { type: integer }
        public_key: { type: string }
    DeviceKeyBundle:
      type: object
      properties:
        device_id: { type: string }
        user_id: { type: string }
        identity_key_alg: { type: string }
        identity_public_key: { type: string }
        agreement_identity_public_key: { type: string }
        signing_key_alg: { type: string }
        signing_public_key: { type: string }
        signed_prekey_id: { type: integer }
        signed_prekey_public_key: { type: string }
        signed_prekey_signature: { type: string }
        key_version: { type: integer }
        trust_level: { type: string }
        published_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        available_one_time_prekeys: { type: integer }
        claimed_one_time_prekey: { $ref: '#/components/schemas/DeviceKeyOneTimePrekey' }
    PublishDeviceKeyBundleRequest:
      type: object
      required: [agreement_identity_public_key, signing_public_key, signed_prekey_id, signed_prekey_public_key, signed_prekey_signature]
      properties:
        identity_key_alg: { type: string }
        identity_public_key: { type: string }
        agreement_identity_public_key: { type: string }
        signing_key_alg: { type: string }
        signing_public_key: { type: string }
        signed_prekey_id: { type: integer }
        signed_prekey_public_key: { type: string }
        signed_prekey_signature: { type: string }
        key_version: { type: integer }
        trust_level: { type: string }
        one_time_prekeys:
          type: array
          items: { $ref: '#/components/schemas/DeviceKeyOneTimePrekey' }
    NotificationPreferences:
      type: object
      properties:
        user_id: { type: string }
        device_id: { type: string }
        push_enabled: { type: boolean }
        mute_unknown_senders: { type: boolean }
        show_previews: { type: boolean }
        muted_conversation_notifications: { type: boolean }
    Device:
      type: object
      properties:
        device_id: { type: string }
        user_id: { type: string }
        platform: { type: string }
        device_name: { type: string }
        client_version: { type: string }
        capabilities:
          type: array
          items: { type: string }
        push_provider: { type: string }
        has_push_subscription: { type: boolean }
        public_key: { type: string }
        attestation_type: { type: string }
        attestation_state: { type: string }
        attested_at:
          type: string
          format: date-time
        attestation_expires_at:
          type: string
          format: date-time
        attestation_last_error: { type: string }
    DeviceUpdateRequest:
      type: object
      properties:
        platform: { type: string }
        device_name: { type: string }
        client_version: { type: string }
        capabilities:
          type: array
          items: { type: string }
        push_provider: { type: string }
        push_subscription: { type: string }
        push_token: { type: string }
        public_key: { type: string }
    DeviceAttestationChallengeResponse:
      type: object
      properties:
        nonce: { type: string }
        expires_at:
          type: string
          format: date-time
    DeviceAttestationVerifyRequest:
      type: object
      required: [attestation_type, payload, signature]
      properties:
        attestation_type: { type: string }
        payload: { type: string }
        signature: { type: string }
    MediaUploadInitRequest:
      type: object
      required: [mime_type]
      properties:
        attachment_id: { type: string }
        mime_type: { type: string }
        file_name: { type: string }
        size_bytes: { type: integer }
        checksum_sha256: { type: string }
        ttl_seconds: { type: integer }
    MediaUploadInitResponse:
      type: object
      properties:
        upload_id: { type: string }
        attachment_id: { type: string }
        token: { type: string }
        upload_url: { type: string }
        method: { type: string }
        object_key: { type: string }
        expires_at:
          type: string
          format: date-time
        headers:
          type: object
          additionalProperties: { type: string }
    MediaAttachmentBindRequest:
      type: object
      required: [attachment_id, message_id]
      properties:
        attachment_id: { type: string }
        message_id: { type: string }
        file_name: { type: string }
    MediaDownloadResponse:
      type: object
      properties:
        attachment_id: { type: string }
        download_url: { type: string }
        expires_at:
          type: string
          format: date-time
        file_name: { type: string }
        mime_type: { type: string }
        size_bytes: { type: integer }
    SendMessageRequest:
      type: object
      required: [conversation_id, idempotency_key, content_type, content]
      properties:
        conversation_id: { type: string }
        idempotency_key: { type: string }
        content_type: { type: string }
        content:
          oneOf:
            - $ref: '#/components/schemas/RichTextContent'
            - type: object
              additionalProperties: true
        client_generated_id: { type: string }
        reply_to_message_id: { type: string }
    SendPhoneMessageRequest:
      type: object
      required: [phone_e164, idempotency_key, content_type, content]
      properties:
        phone_e164: { type: string }
        idempotency_key: { type: string }
        content_type: { type: string }
        content:
          oneOf:
            - $ref: '#/components/schemas/RichTextContent'
            - type: object
              additionalProperties: true
        client_generated_id: { type: string }
        reply_to_message_id: { type: string }
    RichTextSpan:
      type: object
      properties:
        start: { type: integer }
        end: { type: integer }
        style:
          type: string
          enum: [bold, italic, underline, strikethrough, spoiler, link, mention, code, quote]
        url: { type: string }
        user_id: { type: string }
    RichTextMention:
      type: object
      properties:
        user_id: { type: string }
        id: { type: string }
        display: { type: string }
        start: { type: integer }
        end: { type: integer }
    RichTextContent:
      type: object
      required: [text]
      properties:
        text: { type: string }
        spans:
          type: array
          items: { $ref: '#/components/schemas/RichTextSpan' }
        mentions:
          type: array
          items: { $ref: '#/components/schemas/RichTextMention' }
        expires_on_read: { type: boolean }
        expires_in_seconds: { type: integer }
        expires_at:
          type: string
          format: date-time
    SMSDeliveryStatus:
      type: string
      enum: [SENT, FAIL_SEND]
    OHMFDeliveryStatus:
      type: string
      enum: [SENT, DELIVERED, READ, FAIL_DELIVERY, FAIL_SEND]
    SendMessageResponse:
      type: object
      required: [message_id, server_order, transport, status, queued]
      properties:
        message_id: { type: string }
        conversation_id: { type: string }
        reply_to_message_id: { type: string }
        server_order: { type: integer }
        transport: { type: string, enum: [OHMF] }
        status: { $ref: '#/components/schemas/OHMFDeliveryStatus' }
        queued: { type: boolean }
        ack_timeout_ms: { type: integer, nullable: true }
    SendPhoneMessageResponse:
      type: object
      required: [message_id, conversation_id, server_order, transport, status, queued]
      properties:
        message_id: { type: string }
        conversation_id: { type: string }
        reply_to_message_id: { type: string }
        server_order: { type: integer }
        transport: { type: string, enum: [SMS] }
        status: { $ref: '#/components/schemas/SMSDeliveryStatus' }
        queued: { type: boolean }
        ack_timeout_ms: { type: integer, nullable: true }
    Message:
      type: object
      properties:
        message_id: { type: string }
        conversation_id: { type: string }
        sender_user_id: { type: string }
        sender_device_id: { type: string }
        reply_to_message_id: { type: string }
        reply_count: { type: integer }
        content_type: { type: string }
        content:
          oneOf:
            - $ref: '#/components/schemas/RichTextContent'
            - type: object
              additionalProperties: true
        reactions:
          type: object
          additionalProperties: { type: integer }
        client_generated_id: { type: string }
        transport: { type: string }
        server_order: { type: integer }
        status: { type: string }
        created_at:
          type: string
          format: date-time
        sent_at:
          type: string
          format: date-time
        delivered_at:
          type: string
          format: date-time
        read_at:
          type: string
          format: date-time
        status_updated_at:
          type: string
          format: date-time
        edited_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        deleted: { type: boolean }
        deleted_at:
          type: string
          format: date-time
        visibility_state: { type: string }
        source: { type: string }
        pinned_at:
          type: string
          format: date-time
        pinned_by_user_id: { type: string }
    MessageListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Message' }
        next_cursor: { type: string, nullable: true }
    MessageEditHistoryResponse:
      type: object
      properties:
        edits:
          type: array
          items:
            type: object
            additionalProperties: true
    ConversationSearchResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Message' }
    PresenceSession:
      type: object
      properties:
        session_id: { type: string }
        device_id: { type: string }
        version: { type: string }
        last_seen_at_ms: { type: integer }
    UserPresence:
      type: object
      properties:
        user_id: { type: string }
        online: { type: boolean }
        last_seen_at:
          type: string
          format: date-time
        session_count: { type: integer }
        sessions:
          type: array
          items: { $ref: '#/components/schemas/PresenceSession' }
    UserPresenceListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/UserPresence' }
    DeviceKeyBackup:
      type: object
      properties:
        backup_name: { type: string }
        source_device_id: { type: string }
        encrypted_blob: { type: string }
        wrapping_alg: { type: string }
        wrapped_key: { type: string }
        recovery_data:
          type: object
          additionalProperties: true
        attestation_type: { type: string }
        attestation_payload:
          type: object
          additionalProperties: true
        backup_hash: { type: string }
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_restored_at:
          type: string
          format: date-time
    DeviceKeyBackupUpsertRequest:
      type: object
      required: [encrypted_blob]
      properties:
        source_device_id: { type: string }
        encrypted_blob: { type: string }
        wrapping_alg: { type: string }
        wrapped_key: { type: string }
        recovery_data:
          type: object
          additionalProperties: true
        attestation_type: { type: string }
        attestation_payload:
          type: object
          additionalProperties: true
        backup_hash: { type: string }
    DeviceKeyBackupListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DeviceKeyBackup' }
    ConversationReadStatusMember:
      type: object
      properties:
        user_id: { type: string }
        phone: { type: string }
        last_read_server_order: { type: integer }
        last_delivered_server_order: { type: integer }
        read_at:
          type: string
          format: date-time
        delivery_at:
          type: string
          format: date-time
    ConversationReadStatusResponse:
      type: object
      properties:
        members:
          type: array
          items: { $ref: '#/components/schemas/ConversationReadStatusMember' }
    MessageEffectRequest:
      type: object
      required: [effect_type]
      properties:
        effect_type: { type: string }
    AccountExportResponse:
      type: object
      properties:
        export_version: { type: integer }
        exported_at:
          type: string
          format: date-time
        user:
          type: object
          additionalProperties: true
        devices:
          type: array
          items:
            type: object
            additionalProperties: true
        security:
          type: object
          additionalProperties: true
        conversations:
          type: array
          items:
            type: object
            additionalProperties: true
        messages:
          type: array
          items:
            type: object
            additionalProperties: true
    AccountExportArtifact:
      type: object
      properties:
        export_id: { type: string }
        status: { type: string }
        format: { type: string }
        download_token: { type: string }
        size_bytes: { type: integer }
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        downloaded_at:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
    AccountExportArtifactListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AccountExportArtifact' }
    RelayCreateMessageRequest:
      type: object
      required: [destination, content]
      properties:
        destination:
          type: object
          additionalProperties: true
        transport_hint: { type: string }
        content:
          type: object
          additionalProperties: true
    RelayCreateMessageResponse:
      type: object
      properties:
        relay_job_id: { type: string }
    RelayJob:
      type: object
      properties:
        id: { type: string }
        creator_user_id: { type: string }
        destination:
          type: object
          additionalProperties: true
        transport_hint: { type: string }
        content:
          type: object
          additionalProperties: true
        status: { type: string }
        executing_device_id: { type: string }
        consent_state: { type: string }
        required_capability: { type: string }
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
        attested_at:
          type: string
          format: date-time
        result:
          type: object
          additionalProperties: true
    RelayJobListResponse:
      type: object
      properties:
        jobs:
          type: array
          items: { $ref: '#/components/schemas/RelayJob' }
    RelayAcceptRequest:
      type: object
      required: [device_id]
      properties:
        device_id: { type: string }
    RelayResultRequest:
      type: object
      required: [device_id, status]
      properties:
        device_id: { type: string }
        status: { type: string }
        result:
          type: object
          additionalProperties: true
    ForwardMessageRequest:
      type: object
      required: [conversation_id, idempotency_key]
      properties:
        conversation_id: { type: string }
        idempotency_key: { type: string }
        client_generated_id: { type: string }
    ForwardMessageResponse:
      type: object
      required: [message_id, conversation_id, server_order, transport, status, queued]
      properties:
        message_id: { type: string }
        conversation_id: { type: string }
        server_order: { type: integer }
        transport: { type: string, enum: [OHMF, SMS] }
        status: { type: string }
        queued: { type: boolean }
        ack_timeout_ms: { type: integer, nullable: true }
        source: { type: string }
    MiniAppParticipant:
      type: object
      required: [user_id, role]
      properties:
        user_id: { type: string }
        role: { type: string }
        display_name: { type: string }
    MiniAppManifestEnvelope:
      type: object
      required: [id, manifest]
      properties:
        id: { type: string }
        owner_user_id: { type: string }
        manifest:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    MiniAppInstallState:
      type: object
      properties:
        installed: { type: boolean }
        installed_version: { type: string }
        auto_update: { type: boolean }
        enabled: { type: boolean }
    MiniAppPermissionDelta:
      type: object
      properties:
        added:
          type: array
          items: { type: string }
        removed:
          type: array
          items: { type: string }
    MiniAppCatalogEntry:
      type: object
      properties:
        app_id: { type: string }
        title: { type: string }
        summary: { type: string }
        version: { type: string }
        latest_version: { type: string }
        latest_approved_version: { type: string }
        review_status: { type: string, enum: [draft, submitted, under_review, needs_changes, approved, rejected, suspended, revoked] }
        source_type: { type: string }
        published_at:
          type: string
          format: date-time
        manifest:
          type: object
          additionalProperties: true
        install: { $ref: '#/components/schemas/MiniAppInstallState' }
        install_state: { type: string }
        update_available: { type: boolean }
        update_requires_consent: { type: boolean }
        permission_delta: { $ref: '#/components/schemas/MiniAppPermissionDelta' }
    MiniAppCatalogResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/MiniAppCatalogEntry' }
        next_cursor: { type: string }
        total: { type: integer }
    MiniAppUpdateStatus:
      type: object
      properties:
        app_id: { type: string }
        installed_version: { type: string }
        latest_version: { type: string }
        latest_approved_version: { type: string }
        update_available: { type: boolean }
        update_requires_consent: { type: boolean }
        permission_delta: { $ref: '#/components/schemas/MiniAppPermissionDelta' }
    MiniAppPublisherAppRequest:
      type: object
      required: [app_id, name]
      properties:
        app_id: { type: string }
        name: { type: string }
    MiniAppPublisherReleaseRequest:
      type: object
      required: [manifest]
      properties:
        manifest:
          type: object
          additionalProperties: true
    MiniAppRelease:
      type: object
      properties:
        app_id: { type: string }
        version: { type: string }
        review_status: { type: string, enum: [draft, submitted, under_review, needs_changes, approved, rejected, suspended, revoked] }
        manifest_hash: { type: string }
        source_type: { type: string }
        visibility: { type: string }
        supported_platforms:
          type: array
          items: { type: string }
        published_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
        reviewed_by: { type: string }
    MiniAppSessionState:
      type: object
      properties:
        snapshot:
          type: object
          additionalProperties: true
        session_storage:
          type: object
          additionalProperties: true
        shared_conversation_storage:
          type: object
          additionalProperties: true
        projected_messages:
          type: array
          items:
            type: object
            additionalProperties: true
